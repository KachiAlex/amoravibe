[build]
  base = "."
  # Build identity first, generate Prisma client for rhel runtime,
  # then build the web app. Netlify runs this command from the `base` directory.
  command = "cd services/identity && pnpm install && pnpm prisma:generate && pnpm build && cd - && pnpm install && pnpm build"
  publish = "apps/web/.next"
  functions = "services/identity/netlify/functions"

[context.production.environment]
  NODE_VERSION = "20"
  
[build.environment]
  PNPM_HOME = "/usr/local/bin"