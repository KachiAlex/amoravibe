[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/identity/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/identity/health"
  status = 200
  force = true
