<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmoraVibe · Authentic Dating for Every Frequency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #04030f;
        --bg-secondary: #0b0720;
        --card: rgba(16, 12, 36, 0.8);
        --accent: #ff4da4;
        --accent-light: #ff8ec7;
        --text: #fdf5ff;
        --muted: #c4b1dd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Space Grotesk', 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top, rgba(255, 77, 164, 0.25), transparent 45%),
          radial-gradient(circle at 15% 20%, rgba(88, 110, 255, 0.25), transparent 45%), var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      header {
        padding: 2.5rem clamp(1.25rem, 4vw, 3.75rem);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        font-size: 1.15rem;
      }

      .logo svg {
        width: 44px;
        height: 44px;
        filter: drop-shadow(0 12px 18px rgba(255, 77, 164, 0.45));
      }

      nav {
        display: flex;
        gap: 1.5rem;
        align-items: center;
      }

      nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
      }

      nav a.cta-link {
        padding: 0.8rem 1.6rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.75rem;
      }

      main {
        padding: 0 clamp(1.25rem, 4vw, 3.75rem) 4rem;
      }

      .hero {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 3rem;
        align-items: center;
        margin-bottom: 4.5rem;
      }

      .eyebrow {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--muted);
        margin-bottom: 1rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
      }

      .eyebrow::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
      }

      h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2.6rem, 5.2vw, 4.9rem);
        line-height: 1.05;
        margin: 0 0 1.5rem;
      }

      h1 span {
        color: var(--accent-light);
      }

      .lede {
        font-size: 1.15rem;
        color: var(--muted);
        max-width: 42ch;
        margin-bottom: 2.3rem;
      }

      .cta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .cta-button {
        border: none;
        border-radius: 999px;
        padding: 0.95rem 2.6rem;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        background: linear-gradient(120deg, #ff4da4, #ff8ec7);
        color: #180615;
        box-shadow: 0 20px 50px rgba(255, 77, 164, 0.4);
        transition: transform 220ms ease;
      }

      .cta-button.secondary {
        background: transparent;
        color: var(--accent-light);
        border: 1px solid rgba(255, 142, 199, 0.5);
        box-shadow: none;
      }

      .cta-button:hover {
        transform: translateY(-3px);
      }

      .card-grid {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        padding: 2.5rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        position: relative;
        overflow: hidden;
      }

      .card-grid::after {
        content: '';
        position: absolute;
        inset: 14px;
        border: 1px dashed rgba(255, 255, 255, 0.07);
        border-radius: 26px;
        pointer-events: none;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 1.5rem;
      }

      .stat h3 {
        margin: 0;
        font-size: 2.1rem;
        color: var(--accent-light);
      }

      .stat p {
        margin: 0.4rem 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }
