name: Build APK (Docker)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/android-build.Dockerfile
          load: true
          tags: amoravibe-android-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e JAVA_OPTS="-Xmx2048m" \
            amoravibe-android-builder:latest \
            bash -c '
              set -e
              echo "=== Building Amoravibe WebView APK ==="
              
              # Clean lock files and build artifacts
              rm -f yarn.lock package-lock.json
              rm -rf apps/mobile/android/app/build apps/mobile/android/build apps/mobile/android/.gradle
              
              # Install dependencies
              echo "Installing dependencies..."
              npm install --legacy-peer-deps --no-optional > /dev/null 2>&1
              
              # Navigate to mobile app directory
              cd apps/mobile
              
              echo "Building WebView APK without Metro (pure WebView wrapper)..."
              cd android
              chmod +x gradlew
              
              # Build APK directly - no prebuild, no Metro, no lint
              # Target: Pure WebView wrapper loading web app from Netlify
              ./gradlew clean assembleDebug --no-daemon --max-workers=2 2>&1 | grep -E "(BUILD|WARN|ERROR|apk|FAILED|SUCCESS)" || true
              
              # Verify build
              BUILD_OUTPUT="app/build/outputs/apk/debug/app-debug.apk"
              if [ -f "$BUILD_OUTPUT" ]; then
                echo ""
                echo "✓ ─────────────────────────────────────────"
                echo "✓ APK BUILD SUCCESSFUL"
                echo "✓ ─────────────────────────────────────────"
                echo "✓ File: app-debug.apk"
                echo "✓ Size: $(du -h $BUILD_OUTPUT | cut -f1)"
                echo "✓ Path: $BUILD_OUTPUT"
                echo "✓ WebView wrapper (loads amoravibe-web.netlify.app)"
                echo "✓ ─────────────────────────────────────────"
              else
                echo "✗ BUILD FAILED - APK not found"
                ls -la app/build/outputs/apk/ 2>/dev/null || echo "No outputs directory"
                exit 1
              fi
            '
            
      - name: Check APK file
        run: |
          if [ -f "${{ github.workspace }}/apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            ls -lh "${{ github.workspace }}/apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk"
            echo "APK_PATH=apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV
          else
            echo "APK not found!"
            find "${{ github.workspace }}/apps/mobile" -name "*.apk" 2>/dev/null || echo "No APK files"
            exit 1
          fi
            
      - name: Extract APK
        run: |
          mkdir -p apk-output
          if [ -f "apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk apk-output/amoravibe-debug.apk
          elif [ -f "apps/mobile/android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk apk-output/amoravibe.apk
          else
            echo "APK files not found!"
            exit 1
          fi
          ls -lh apk-output/
          
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: amoravibe-apk-docker
          path: apk-output/
          retention-days: 30
          
      - name: Comment on commit with APK download link
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ APK Build Successful!\n\n📦 Download: [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n**File:** app-debug.apk\n\n**Install:**\n\`\`\`\nadb install -r app-debug.apk\n\`\`\``
            })
        continue-on-error: true
