name: Build APK (Docker)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/android-build.Dockerfile
          load: true
          tags: amoravibe-android-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e JAVA_OPTS="-Xmx2048m" \
            amoravibe-android-builder:latest \
            bash -c '
              set -e
              echo "=== Building Amoravibe WebView APK ==="
              
              # Install ImageMagick for icon conversion
              apt-get update > /dev/null 2>&1 && apt-get install -y imagemagick > /dev/null 2>&1
              
              # Copy Amoravibe logo to assets as icons
              echo "Setting app icons from Amoravibe logo..."
              LOGO="public/images/logo.jpg"
              ASSETS="apps/mobile/assets"
              
              # Convert logo to PNG icons
              convert "$LOGO" -resize 192x192 "$ASSETS/icon.png"
              convert "$LOGO" -resize 192x192 "$ASSETS/adaptive-icon.png"  
              convert "$LOGO" -resize 512x512 "$ASSETS/splash-icon.png"
              convert "$LOGO" -resize 192x192 "$ASSETS/favicon.png"
              
              # Clean lock files
              rm -f yarn.lock package-lock.json
              
              # Install dependencies
              echo "Installing dependencies..."
              npm install --legacy-peer-deps --no-optional > /dev/null 2>&1
              
              # DO NOT RUN PREBUILD - the android directory already exists
              # We just build with Gradle directly
              
              cd apps/mobile/android
              chmod +x gradlew
              
              echo "Building WebView APK (pure wrapper, no Metro)..."
              # Clean and build - no prebuild needed
              ./gradlew clean assembleDebug --no-daemon --max-workers=2 --build-cache 2>&1 | tail -100
              
              # Verify build
              BUILD_OUTPUT="app/build/outputs/apk/debug/app-debug.apk"
              if [ -f "$BUILD_OUTPUT" ]; then
                echo ""
                echo "✓ ─────────────────────────────────────────"
                echo "✓ APK BUILD SUCCESSFUL!"
                echo "✓ ─────────────────────────────────────────"
                echo "✓ Filename: app-debug.apk"
                echo "✓ Size: $(du -h $BUILD_OUTPUT | cut -f1)"
                echo "✓ Icon: Amoravibe logo embedded"
                echo "✓ WebView wrapper (no Metro, no dev server)"
                echo "✓ Loads: https://amoravibe-web.vercel.app/"
                echo "✓ ─────────────────────────────────────────"
              else
                echo "✗ BUILD FAILED - APK not found"
                ls -la app/build/outputs/ 2>/dev/null || echo "No outputs"
                exit 1
              fi
            '
            
      - name: Check APK file
        run: |
          if [ -f "${{ github.workspace }}/apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            ls -lh "${{ github.workspace }}/apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk"
            echo "APK_PATH=apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV
          else
            echo "APK not found!"
            find "${{ github.workspace }}/apps/mobile" -name "*.apk" 2>/dev/null || echo "No APK files"
            exit 1
          fi
            
      - name: Extract APK
        run: |
          mkdir -p apk-output
          if [ -f "apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk apk-output/amoravibe-debug.apk
          elif [ -f "apps/mobile/android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk apk-output/amoravibe.apk
          else
            echo "APK files not found!"
            exit 1
          fi
          ls -lh apk-output/
          
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: amoravibe-apk-docker
          path: apk-output/
          retention-days: 30
          
      - name: Comment on commit with APK download link
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ APK Build Successful!\n\n📦 Download: [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n**File:** app-debug.apk\n\n**Install:**\n\`\`\`\nadb install -r app-debug.apk\n\`\`\``
            })
        continue-on-error: true
