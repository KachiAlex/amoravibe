name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean lock files
        run: |
          rm -f yarn.lock
          rm -f package-lock.json

      - name: Install dependencies
        run: npm install --verbose

      - name: Setup EAS
        run: npm install -g eas-cli@latest

      - name: EAS Login
        run: eas login --non-interactive
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build APK with EAS
        run: |
          cd $GITHUB_WORKSPACE
          eas build --platform android --profile production --non-interactive
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Download APK
        run: |
          BUILD_ID=$(eas build list --platform android --json | jq -r '.[0].id')
          echo "Build ID: $BUILD_ID"
          mkdir -p builds
          eas build:download --path ./builds --id "$BUILD_ID"

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: builds/**/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: builds/**/*.apk
          tag_name: release-${{ github.run_number }}
          release_name: Android APK Release ${{ github.run_number }}
          body: |
            ✅ Android APK built successfully!
            
            **Build Information:**
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            
            **How to Install:**
            ```bash
            adb install -r amoravibe-app-release.apk
            ```
            
            Or install on emulator:
            ```bash
            adb -e install -r amoravibe-app-release.apk
            ```
            
            **App Details:**
            - Loads web app from: https://amoravibe-web.netlify.app
            - Supports sessions and cookies
            - Full mobile view
