name: Build Android APK (Capacitor)

on:
  workflow_dispatch: {}
  push:
    branches: [ master ]

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install web dependencies
        run: |
          cd apps/web
          npm ci

      - name: Build and export web app
        run: |
          cd apps/web
          npm run build:web

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          build-tools: '33.0.2'

      - name: Install Capacitor CLI locally
        run: |
          cd apps/web
          npm install @capacitor/cli @capacitor/core --no-audit --no-fund

      - name: Initialize Capacitor if missing
        run: |
          cd apps/web
          npx cap init AmoraVibe com.amoravibe.app --web-dir=out || true

      - name: Add Android platform if missing
        run: |
          cd apps/web
          npx cap add android || true

      - name: Copy web assets to Android project and sync
        run: |
          cd apps/web
          npx cap copy android
          npx cap sync android

      - name: Apply generated icons to Android project (if any)
        run: |
          cd apps/web
          node scripts/apply-icons-to-android.js || true

      - name: Build debug APK
        run: |
          cd apps/web/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Sign APK (optional, requires secrets)
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          cd apps/web
          echo "$ANDROID_KEYSTORE" | base64 -d > release.keystore
          APK_PATH=android/app/build/outputs/apk/debug/app-debug.apk
          BUILD_TOOLS_DIR=${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools
          LATEST_BUILD_TOOLS=$(ls $BUILD_TOOLS_DIR | sort -V | tail -n1)
          APKSIGNER="$BUILD_TOOLS_DIR/$LATEST_BUILD_TOOLS/apksigner"
          if [ ! -f "$APKSIGNER" ]; then
            echo "apksigner not found; skipping signing.";
            exit 0;
          fi
          echo "Signing $APK_PATH with alias $ANDROID_KEY_ALIAS"
          "$APKSIGNER" sign --ks release.keystore --ks-pass pass:$ANDROID_KEYSTORE_PASSWORD --key-pass pass:$ANDROID_KEY_PASSWORD "$APK_PATH"

      - name: Create GitHub Release and upload signed APK (optional)
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-release-${{ github.run_id }}
          name: Android Release ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload signed APK to Release (if signing completed)
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        uses: actions/upload-release-asset@v2
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-signed.apk
          asset_content_type: application/vnd.android.package-archive

  notify:
    name: Notify (optional)
    runs-on: ubuntu-latest
    needs: build-apk
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload artifact reference
        run: echo "APK build finished. Check artifacts in the workflow run." 
